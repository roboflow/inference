name: Publish Inference Models Wheels to PyPi
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually publish the package to PyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: ${{ github.event_name == 'release' && 'Release publish' || (github.event.inputs.publish == 'true' && 'Manual publish' || 'Manual build only') }}
    runs-on:
      labels: depot-ubuntu-22.04-small
      group: public-depot
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
      - name: 📦 Install dependencies
        working-directory: inference_models
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
      - name: 🔨 Build package
        working-directory: inference_models
        run: |
          python -m uv build
      - name: 🚀 Publish to PyPI
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: inference_models/dist/
          skip-existing: true
