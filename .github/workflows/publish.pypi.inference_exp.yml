name: Publish Inference Experimental Wheels to PyPi
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually publish the package to PyPI"
        required: false
        default: false
        type: boolean
      pre_release:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: ${{ github.event_name == 'release' && 'Release publish' || (github.event.inputs.publish == 'true' && (github.event.inputs.pre_release == 'true' && 'Manual publish (pre-release)' || 'Manual publish (rejected - non-prerelease)') || 'Manual build only') }}
    runs-on:
      labels: depot-ubuntu-22.04-small
      group: public-depot
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
      - name: 📦 Install dependencies
        working-directory: inference_models
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
      - name: 🏷️ Modify version for pre-release
        id: version
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pre_release == 'true' }}
        working-directory: inference_models
        run: |
          CURRENT_VERSION=$(grep -m 1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"

          if [[ $CURRENT_VERSION =~ ^(.+)rc([0-9]+)$ ]]; then
            # Has valid rc suffix - increment it
            BASE_VERSION="${BASH_REMATCH[1]}"
            RC_NUM="${BASH_REMATCH[2]}"
            NEW_RC=$((RC_NUM + 1))
            NEW_VERSION="${BASE_VERSION}rc${NEW_RC}"
            echo "Incrementing RC: $CURRENT_VERSION -> $NEW_VERSION"
          elif [[ $CURRENT_VERSION =~ rc ]]; then
            # Has rc but not followed by valid number
            echo "::error::Invalid RC suffix in version '$CURRENT_VERSION'. Expected format: X.Y.ZrcN where N is a number."
            echo "skip_publish=true" >> $GITHUB_OUTPUT
            exit 0
          else
            # No rc suffix - add rc1
            NEW_VERSION="${CURRENT_VERSION}rc1"
            echo "Adding RC suffix: $CURRENT_VERSION -> $NEW_VERSION"
          fi

          sed -i.bak "s/^version = \"${CURRENT_VERSION}\"/version = \"${NEW_VERSION}\"/" pyproject.toml
          rm pyproject.toml.bak
          echo "New pre-release version: $NEW_VERSION"
      - name: 🔨 Build package
        working-directory: inference_models
        run: |
          python -m uv build
      - name: 🚀 Publish to PyPI
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: inference_models/dist/
          skip-existing: true
