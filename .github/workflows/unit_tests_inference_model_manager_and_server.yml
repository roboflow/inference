name: UNIT TESTS - inference-model-manager & inference-server
permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - inference_model_manager/**
      - inference_server/**
  push:
    branches: [main]
    paths:
      - inference_model_manager/**
      - inference_server/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  call_is_mergeable:
    uses: ./.github/workflows/check_if_branch_is_mergeable.yml
    secrets: inherit
  unit-tests-inference-model-manager-and-server:
    needs: call_is_mergeable
    if: ${{ github.event_name != 'pull_request' || needs.call_is_mergeable.outputs.mergeable_state != 'not_clean' }}
    runs-on:
      labels: depot-ubuntu-22.04-4
      group: public-depot
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
      - name: 📦 Cache Python packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('inference_models/pyproject.toml', 'inference_model_manager/pyproject.toml', 'inference_server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
      - name: 📦 Install dependencies (local sources)
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          python -m uv venv
          python -m uv pip install -e inference_models[test] --python .venv
          python -m uv pip install -e inference_model_manager[test] --python .venv
          python -m uv pip install -e inference_server[test] --python .venv
      - name: 🧪 Unit Tests of Inference Server
        timeout-minutes: 10
        working-directory: inference_server
        run: ../.venv/bin/pytest tests/unit_tests
      - name: 🧪 Unit Tests of Inference Model Manager
        timeout-minutes: 10
        working-directory: inference_model_manager
        run: ../.venv/bin/pytest tests/unit_tests
