name: Build and Push Jetson 7.2.0 Wheels Container

permissions:
  contents: read

on:
  release:
    types: [created]
  push:
    branches:
      - main
      # Bootstrap trigger while the MVP branch is in flight; remove after merge.
      - mvp/new-inference-pipeline
    paths:
      - ".github/workflows/docker.wheels.jetson.7.2.0.yml"
      - "docker/dockerfiles/Dockerfile.wheels.jetson.7.2.0"
      - "docker/docker-bake.jetson.7.2.0.hcl"
      - "docker/patches/**"
  workflow_dispatch:
    inputs:
      force_push:
        type: boolean
        description: "Do you want to push the image after building?"
        default: false
      custom_tag:
        type: string
        description: "Custom tag to use for the image"
        default: ""

env:
  VERSION: "0.0.0"
  BASE_IMAGE: "roboflow/roboflow-inference-wheels-jetson-7.2.0"

jobs:
  # Build the dependency graph as actual parallel Actions steps. Depot shares the
  # project cache between invocations, so child stages reuse Torch rather than
  # compiling it again on their dedicated 64-core builders.
  components:
    name: Build JP7.2 framework wheel components
    runs-on:
      labels: depot-ubuntu-24.04
      group: public-depot
    timeout-minutes: 1440
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Depot CLI
        uses: depot/setup-action@v1
      - name: Build Torch
        id: torch
        background: true
        uses: depot/bake-action@v1
        with:
          files: ./docker/docker-bake.jetson.7.2.0.hcl
          targets: jetson-wheels-torch-jp72
          project: v1xzfwkc4b

      - parallel:
          - name: Build ONNX Runtime
            uses: depot/bake-action@v1
            with:
              files: ./docker/docker-bake.jetson.7.2.0.hcl
              targets: jetson-wheels-ort-jp72
              project: v1xzfwkc4b
          - name: Fetch Triton
            uses: depot/bake-action@v1
            with:
              files: ./docker/docker-bake.jetson.7.2.0.hcl
              targets: jetson-wheels-triton-jp72
              project: v1xzfwkc4b
          - name: Build PyCUDA
            uses: depot/bake-action@v1
            with:
              files: ./docker/docker-bake.jetson.7.2.0.hcl
              targets: jetson-wheels-pycuda-jp72
              project: v1xzfwkc4b

      - name: Wait for Torch
        wait: torch

      - parallel:
          - name: Build torchvision
            uses: depot/bake-action@v1
            with:
              files: ./docker/docker-bake.jetson.7.2.0.hcl
              targets: jetson-wheels-torchvision-jp72
              project: v1xzfwkc4b
          - name: Build FlashAttention
            uses: depot/bake-action@v1
            with:
              files: ./docker/docker-bake.jetson.7.2.0.hcl
              targets: jetson-wheels-flash-attn-jp72
              project: v1xzfwkc4b

  assemble:
    name: Assemble wheels image
    needs: components
    runs-on:
      labels: depot-ubuntu-24.04-4
      group: public-depot
    timeout-minutes: 180
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Login to Docker Hub
        if: ${{ github.event_name == 'release' || inputs.force_push }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@v6
      - name: Read version from file
        run: echo "VERSION=$(DISABLE_VERSION_CHECK=true python ./inference/core/version.py)" >> "$GITHUB_ENV"
      - name: Determine image tags
        id: tags
        uses: ./.github/actions/determine-tags
        with:
          custom_tag: ${{ inputs.custom_tag }}
          version: ${{ env.VERSION }}
          base_image: ${{ env.BASE_IMAGE }}
          force_push: ${{ inputs.force_push }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Depot CLI
        uses: depot/setup-action@v1
      - name: Build image
        uses: depot/bake-action@v1
        env:
          JETSON_WHEELS_TAGS: ${{ steps.tags.outputs.image_tags }}
        with:
          files: ./docker/docker-bake.jetson.7.2.0.hcl
          targets: jetson-wheels-jp72
          project: v1xzfwkc4b
          push: ${{ github.event_name == 'release' || inputs.force_push }}
          save: ${{ github.event_name != 'release' && !inputs.force_push }}
          save-tag: ${{ github.event_name != 'release' && !inputs.force_push && format('wheels-jp72-{0}', github.sha) || '' }}
