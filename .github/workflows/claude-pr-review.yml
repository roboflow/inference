name: Claude PR Review

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Same-repository PR number to review"
        required: true
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  gate:
    name: Decide whether to review
    # Cheap eligibility filter; the step does the full validation + gate decision.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        !github.event.pull_request.draft &&
        github.event.pull_request.user.type != 'Bot'
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.event.comment.user.type != 'Bot' &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'OWNER'
        )
      )
    runs-on: ubuntu-latest
    outputs:
      should_review: ${{ steps.gate.outputs.should_review }}
      number: ${{ steps.gate.outputs.number }}
      base_sha: ${{ steps.gate.outputs.base_sha }}
      head_sha: ${{ steps.gate.outputs.head_sha }}
    steps:
      - name: Resolve, validate, and gate
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          GH_EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_PR: ${{ inputs.pr_number }}
          # Comment body via env (NOT inline ${{ }}) to avoid shell-injection.
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          FORCE_TAG='/claude-review'
          MARKER='<!-- claude-pr-review:run-marker -->'

          case "$GH_EVENT_NAME" in
            workflow_dispatch) pr_number="$DISPATCH_PR" ;;
            issue_comment)     pr_number="$ISSUE_NUMBER" ;;
            *)                 pr_number="$PR_NUMBER" ;;
          esac

          pr_json="$(gh api "repos/${REPO}/pulls/${pr_number}")"
          state="$(echo "$pr_json"  | jq -r '.state')"
          base_ref="$(echo "$pr_json" | jq -r '.base.ref')"
          base_sha="$(echo "$pr_json" | jq -r '.base.sha')"
          head_sha="$(echo "$pr_json" | jq -r '.head.sha')"
          head_repo="$(echo "$pr_json" | jq -r '.head.repo.full_name')"
          draft="$(echo "$pr_json" | jq -r '.draft')"
          author_type="$(echo "$pr_json" | jq -r '.user.type')"

          emit() {
            {
              echo "should_review=$1"
              echo "number=${pr_number}"
              echo "base_sha=${base_sha}"
              echo "head_sha=${head_sha}"
            } >> "$GITHUB_OUTPUT"
          }
          skip() { echo "::notice::PR #${pr_number}: $1 — skipping review."; emit false; exit 0; }

          [ "$state" = "open" ]          || skip "not open"
          [ "$base_ref" = "main" ]       || skip "targets ${base_ref}, not main"
          [ "$head_repo" = "${REPO}" ]   || skip "from a fork (${head_repo})"
          [ "$draft" = "false" ]         || skip "is a draft"
          [ "$author_type" != "Bot" ]    || skip "opened by a bot"

          if [ "$GH_EVENT_NAME" = "issue_comment" ]; then
            # Re-review only on an explicit force-tag comment that is newer than the
            # last review-start marker (i.e. not already serviced by a prior review).
            case "$COMMENT_BODY" in
              *"$FORCE_TAG"*) : ;;
              *) skip "comment does not contain ${FORCE_TAG}" ;;
            esac
            comments="$(gh api --paginate "repos/${REPO}/issues/${pr_number}/comments" | jq -s 'add // []')"
            last_marker="$(echo "$comments" | jq -r --arg m "$MARKER"     '[.[]|select(.body|contains($m))|.created_at]|max // ""')"
            last_force="$(echo "$comments"  | jq -r --arg t "$FORCE_TAG"  '[.[]|select(.body|contains($t))|.created_at]|max // ""')"
            if [ -n "$last_marker" ] && [[ ! "$last_force" > "$last_marker" ]]; then
              skip "no ${FORCE_TAG} comment newer than the last review marker"
            fi
          fi

          # pull_request (opened/reopened/ready_for_review), workflow_dispatch, or a
          # valid new force-tag comment.
          emit true

  review:
    name: Review pull request
    needs: gate
    if: needs.gate.outputs.should_review == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Post review-start marker
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.gate.outputs.number }}
          HEAD_SHA: ${{ needs.gate.outputs.head_sha }}
        run: |
          set -euo pipefail
          # Separate marker comment the gate uses as "last review", and which tells
          # contributors how to request a re-review after new commits.
          body="$(printf '%s\n' \
            '<!-- claude-pr-review:run-marker -->' \
            "🤖 **Claude review started** at commit \`${HEAD_SHA}\`." \
            '' \
            'New commits are **not** auto-reviewed. Comment `/claude-review` when you are ready for a re-review.')"
          gh pr comment "$PR" --repo "$REPO" --body "$body"

      - name: Checkout trusted base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Cache Python packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-claude-review-pip-3.10-${{ hashFiles('requirements/**') }}
          restore-keys: |
            ${{ runner.os }}-claude-review-pip-3.10-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          check-latest: true

      - name: Install review dependencies
        timeout-minutes: 15
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install \
            -r requirements/_requirements.txt \
            -r requirements/requirements.cpu.txt \
            -r requirements/requirements.sdk.http.txt \
            -r requirements/requirements.test.unit.txt \
            -r requirements/requirements.http.txt \
            -r requirements/requirements.transformers.txt \
            -r requirements/requirements.code_analysis.txt
          python -m pip install -e ./inference_models[test,torch-cpu,onnx-cpu]

      - name: Load review prompt
        id: review-prompt
        run: |
          if [ ! -f .github/prompts/claude-pr-review.md ]; then
            echo "prompt_available=false" >> "$GITHUB_OUTPUT"
            echo "Trusted base branch does not contain .github/prompts/claude-pr-review.md; skipping Claude review."
            exit 0
          fi

          {
            echo "prompt<<EOF"
            echo "REPO: ${{ github.repository }}"
            echo "PR NUMBER: ${{ needs.gate.outputs.number }}"
            echo "BASE SHA: ${{ needs.gate.outputs.base_sha }}"
            echo "HEAD SHA: ${{ needs.gate.outputs.head_sha }}"
            echo
            cat .github/prompts/claude-pr-review.md
            echo "EOF"
            echo "prompt_available=true"
          } >> "$GITHUB_OUTPUT"

      - name: Stage trusted review skills
        run: |
          # Snapshot the review skills from the TRUSTED base checkout so the PR's
          # own (untrusted) copy cannot alter the reviewer's guidance.
          rm -rf "${RUNNER_TEMP}/trusted_skills"
          if [ -d .claude/skills ]; then
            mkdir -p "${RUNNER_TEMP}/trusted_skills"
            cp -R .claude/skills/. "${RUNNER_TEMP}/trusted_skills/"
          fi

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Restore trusted review skills
        if: steps.review-prompt.outputs.prompt_available == 'true'
        run: |
          set -euo pipefail
          rm -rf .claude/skills
          if [ ! -d "${RUNNER_TEMP}/trusted_skills" ]; then
            echo "::error::Trusted review skills snapshot missing at ${RUNNER_TEMP}/trusted_skills — the base branch must contain .claude/skills. Failing closed."
            exit 1
          fi
          mkdir -p .claude
          cp -R "${RUNNER_TEMP}/trusted_skills" .claude/skills

      - name: Claude review
        if: steps.review-prompt.outputs.prompt_available == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.TMP_PAWELS_CLAUDE_API_KEY_USE_WISELY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          include_fix_links: false
          display_report: false
          show_full_output: false
          prompt: ${{ steps.review-prompt.outputs.prompt }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 50
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api repos/*/*/issues/*/comments --paginate),Bash(gh api repos/*/*/pulls/*/comments --paginate),Bash(gh api repos/*/*/pulls/*/reviews --paginate),Bash(gh api repos/*/*/pulls/*/commits --paginate),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(python:*),Bash(python3:*),Bash(pytest:*)"
