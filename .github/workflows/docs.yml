name: Docs Workflow
permissions:
  contents: read

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy docs?"
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: depot-ubuntu-22.04-32
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out inference repository
        uses: actions/checkout@v4
        with:
          path: inference_repo

      - name: Create GitHub App token (enterprise blocks)
        id: enterprise_blocks_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ENTERPRISE_BLOCKS_APP_ID }}
          private-key: ${{ secrets.ENTERPRISE_BLOCKS_PEM }}
          owner: roboflow
          repositories: workflows-enterprise-blocks

      - name: Check out enterprise blocks
        uses: actions/checkout@v4
        with:
          repository: roboflow/workflows-enterprise-blocks
          ref: main
          path: roboflow_enterprise_blocks
          token: ${{ steps.enterprise_blocks_token.outputs.token }}

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install Docs Theme
        run: |
          npm ci
        working-directory: ./inference_repo/theme_build

      - name: Build theme assets
        run: npm run build
        working-directory: ./inference_repo/theme_build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          check-latest: true

      - name: Install Python dependencies
        run: |
          # Upgrade pip and setuptools
          python -m pip install --upgrade pip setuptools

          # Install doc requirements
          pip install -r requirements/requirements.docs.txt

          # Install remaining dependencies
          pip install -r requirements/_requirements.txt \
                      -r requirements/requirements.cpu.txt \
                      -r requirements/requirements.sdk.http.txt \
                      -r requirements/requirements.test.unit.txt \
                      -r requirements/requirements.test.integration.txt \
                      -r requirements/requirements.http.txt \
                      -r requirements/requirements.cli.txt

          pip install -e .
        working-directory: ./inference_repo

      - name: Install enterprise blocks
        run: pip install .
        working-directory: ./roboflow_enterprise_blocks

      - name: Generate API reference pages
        run: python docs/scripts/gen_ref_pages.py
        working-directory: ./inference_repo

      - name: Build block docs
        run: python -m development.docs.build_block_docs
        working-directory: ./inference_repo

      - name: Build workflows gallery
        env:
          WORKFLOWS_GALLERY_API_KEY: ${{ secrets.WORKFLOWS_GALLERY_API_KEY }}
        run: python -m development.docs.workflows_gallery_builder
        working-directory: ./inference_repo

      - name: Write CLI docs
        run: python -m development.docs.write_cli_docs
        working-directory: ./inference_repo

      - name: Write OpenAPI spec
        run: python -m development.docs.write_openapi_spec
        working-directory: ./inference_repo

      - name: Replace template variables (VERSION, etc.)
        run: python docs/scripts/macros.py
        working-directory: ./inference_repo

      - name: Validate generated docs (Jinja2 syntax)
        run: python -m development.docs.validate_docs_jinja2
        working-directory: ./inference_repo

      - name: Build docs
        run: zensical build --clean
        working-directory: ./inference_repo

      - name: Verify build output
        run: |
          echo "Checking for theme assets in site/..."
          test -f site/static/styles.css || { echo "ERROR: site/static/styles.css missing!"; exit 1; }
          test -f site/static/dist/home.js || { echo "ERROR: site/static/dist/home.js missing!"; exit 1; }
          echo "Theme assets OK."
          echo "Checking for API reference pages..."
          test -d site/reference/inference || { echo "ERROR: site/reference/inference/ missing!"; exit 1; }
          test -d site/reference/inference_sdk || { echo "ERROR: site/reference/inference_sdk/ missing!"; exit 1; }
          test -d site/reference/inference_cli || { echo "ERROR: site/reference/inference_cli/ missing!"; exit 1; }
          echo "API reference OK."
        working-directory: ./inference_repo

      - name: Upload site artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-preview
          path: ./inference_repo/site
          retention-days: 7

      - name: Deploy docs
        # Only deploy if release event OR if deploy input was set to true
        if: ${{ github.event_name == 'release' || github.event.inputs.deploy == 'true' }}
        run: |
          pip install ghp-import
          ghp-import -n -p -f site
        working-directory: ./inference_repo
