# Depot and Jetson runners are organization-managed labels, not GitHub-hosted
# runner labels. Allow them while retaining actionlint's runner validation for
# every other label.
self-hosted-runner:
  labels:
    - depot-ubuntu-*
    - Roboflow-GPU-VM-Runner
    - jetpack-*
    - jetson

# actionlint 1.7.12 predates GitHub's June 2026 background/wait/parallel step
# syntax. GitHub itself accepts this workflow; limit the compatibility waiver to
# that one file, so all other workflows still receive full syntax checks.
paths:
  # Existing workflows use optional dispatch inputs and dynamic matrix keys in
  # ways GitHub accepts but actionlint cannot infer statically. Keep these
  # narrowly scoped baseline waivers until those workflows are modernized.
  .github/workflows/**/*.{yml,yaml}:
    ignore:
      - 'property "python-version" is not defined in object type \{\}'
      - 'property "extras" is not defined in object type'
      - 'property "python_version" is not defined in object type'
      - 'string should not be empty'
      - '"github.head_ref" is potentially untrusted'

  .github/workflows/docker.wheels.jetson.7.2.0.yml:
    ignore:
      - 'unexpected key "background"'
      - 'step must run script with "run" section or run action with "uses" section'
