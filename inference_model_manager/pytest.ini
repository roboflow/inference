[pytest]
# Parallel by default; loadfile keeps each test file on one worker so
# module-scoped backend fixtures spawn once. Opt out with -n0.
addopts = -n auto --dist loadfile
# Dump all thread stacks if any test/fixture phase exceeds this — catches
# teardown hangs that pytest-timeout (test-body only) cannot.
faulthandler_timeout = 120
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    torch_models: marks tests that load real torch model artifacts
    cuda: marks tests as requiring CUDA — auto-skipped when torch.cuda.is_available() is False
filterwarnings =
    ignore:The given buffer is not writable:UserWarning
